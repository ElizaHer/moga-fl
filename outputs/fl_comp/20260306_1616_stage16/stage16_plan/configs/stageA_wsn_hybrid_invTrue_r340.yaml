strategy_name: hybrid_opt
dataset:
  name: cifar10
  data_dir: ./data
  alpha: 0.5
  batch_size: 768
fl:
  num_clients: 10
  num_rounds: 340
  local_epochs: 1
  lr: 0.0005
  fraction_fit: 0.5
  seed: 42
  client_resources:
    num_cpus: 5
    num_gpus: 0.2
wireless:
  wireless_model: wsn
  simulated_mode: good
  jitter_period_rounds: 20
  jitter_start_state: bad
  wsn_csv_path: ./data/wsn-indfeat-dataset/combined_wsn.csv
  wsn_snr_col: snr
  wsn_rssi_col: rssi
  wsn_noise_col: noise_floor
  wsn_prr_col: prr
  wsn_per_col: per
  channel_model: tr38901_umi
  block_fading_intensity: 1.0
  base_snr_db: 8.0
  per_k: 1.0
  bandwidth_budget_mb_per_round: 12.0
  tx_power_watts: 1.0
  compute_power_watts: 8.0
  compute_rate_samples_per_sec: 2000
algorithm:
  name: fedprox
  fedprox_mu: 0.01
energy:
  initial_client_energy: 11333.333333333334
  client_initial_energies: null
  min_energy_floor_per_round: 0.0
scheduler:
  selection_top_k: 0
  fair_window_size: 4
  data_value_weights:
    novelty_w: 0.2
    tail_w: 0.4
    size_w: 0.4
  contribution_ema_beta: 0.9
  historical_contribution_warmup_rounds: 8
  energy_guard:
    min_reserve_energy_ratio: 0.1
    future_energy_factor: 1.2
    survival_gamma: 1.5
  selection_guard:
    max_consecutive_selected: 3
    cooldown_rounds: 2
  wsn_guard_relax:
    enable: false
    reserve_ratio_multiplier: 0.6
    future_factor_multiplier: 0.85
    max_consecutive_selected: 8
    cooldown_rounds: 0
  bandwidth_first_penalty:
    enable: false
    streak_threshold: 3
    energy_multiplier: 1.6
    cooldown_rounds: 2
  weights:
    channel_w: 0.25
    data_w: 0.25
    fair_w: 0.25
    energy_w: 0.15
controller:
  mode_policy: hybrid
  semi_sync_wait_ratio: 0.7
  hybrid_semi_sync_wait_ratio: 0.88
  window_size: 4
  gate_thresholds:
    to_async: 0.58
    to_semi_sync: 0.42
  hysteresis_margin: 0.03
  bridge_rounds: 2
  min_rounds_between_switch: 2
  gate_weights:
    per: 0.5
    fairness: 0.3
    energy: 0.2
  bandwidth_rebalance:
    low_energy_factor: 0.8
    high_energy_factor: 1.0
  bridge_invariants:
    enable: true
    energy_budget_round: 140.0
    upload_time_budget_round: 2.9
    fairness_debt_trend: non_increasing
    violation_weights:
      budget: 0.5
      stale: 0.3
      fair: 0.2
    thresholds:
      th1: 0.16
      th2: 0.32
      th3: 0.52
    downweight_factor: 0.7
    throttle_drop_ratio: 0.2
    rate_limit_factor: 0.92
    bridge_extend_rounds: 1
    max_bridge_rounds: 8
    fail_streak_for_extend: 2
fedbuff:
  buffer_size: 16
  min_updates_to_aggregate: 8
  staleness_alpha: 1.0
  max_staleness: 8
  async_agg_interval: 2
